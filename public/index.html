<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxel Island Lobby — Multiplayer 3D</title>
  <meta name="description" content="A Minecraft-style 3D multiplayer lobby with voxel island, game portals, and the Ambedkar monument."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #87CEEB;
      font-family: 'Inter', sans-serif;
      cursor: crosshair;
    }

    canvas { display: block; }

    /* ── Loading Screen ────────────────────────── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(180deg, #6db35a 0%, #4a8c3f 40%, #866043 70%, #5c3d2e 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      transition: opacity 0.8s ease;
    }
    #loading.done { opacity: 0; pointer-events: none; }

    #loading h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.4rem;
      color: #fff;
      text-shadow: 3px 3px 0 #3d6b30, -1px -1px 0 #3d6b30;
      letter-spacing: 3px;
    }
    #loading p {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #d4e8c2;
      letter-spacing: 1px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HUD ───────────────────────────────────── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }

    #player-count {
      position: absolute; top: 16px; right: 16px;
      background: rgba(93, 153, 72, 0.85);
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.15);
      padding: 8px 14px; border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem; color: #fff;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #player-count .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #7dff5c;
      box-shadow: 0 0 6px #5dff3c;
    }

    #controls-help {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(93, 76, 60, 0.85);
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.1);
      padding: 10px 16px; border-radius: 6px;
      font-size: 0.65rem; color: #d4c8b8;
      line-height: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #controls-help kbd {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px; padding: 2px 6px;
      font-family: 'Press Start 2P', monospace; font-size: 0.45rem;
      color: #fff;
    }

    #portal-msg {
      position: absolute; bottom: 80px;
      left: 50%; transform: translateX(-50%);
      background: rgba(93, 76, 60, 0.9);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,215,0,0.4);
      padding: 10px 28px; border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem; color: #ffd700;
      opacity: 0; transition: opacity 0.3s ease;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    #portal-msg.show { opacity: 1; }

    /* ── Crosshair ─────────────────────────────── */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 2px; height: 2px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none; z-index: 11;
      box-shadow: 0 0 4px rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>VOXEL ISLAND</h1>
    <p>Loading world...</p>
    <div class="spinner"></div>
  </div>

  <div id="hud">
    <div id="player-count"><div class="dot"></div><span id="count-text">1 Online</span></div>
    <div id="controls-help">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
      <kbd>MOUSE</kbd> Camera &nbsp;
      <kbd>SHIFT</kbd> Sprint
    </div>
    <div id="portal-msg"></div>
  </div>
  <div id="crosshair"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "TypingRing": "/js/TypingRing.js"
    }
  }
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
